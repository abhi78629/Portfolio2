<svg xmlns="http://www.w3.org/2000/svg" width="700" height="420" viewBox="0 0 700 420" role="img" aria-labelledby="title desc">
  <title id="title">Diabetes ML Visual</title>
  <desc id="desc">Glowing capsule shape representing healthcare machine learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1d2a"/>
      <stop offset="1" stop-color="#243a52"/>
    </linearGradient>
    <linearGradient id="capsule" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#224f59"/>
      <stop offset="1" stop-color="#1c2f3d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38f6e2"/>
      <stop offset="1" stop-color="#1f9eff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="700" height="420" fill="url(#bg)"/>

  <g opacity="0.2" stroke="#7aa6c3" stroke-width="1.3">
    <path d="M0 320 H700"/>
    <path d="M0 286 H700"/>
    <path d="M0 252 H700"/>
    <path d="M0 218 H700"/>
    <path d="M0 184 H700"/>
    <path d="M0 150 H700"/>
  </g>

  <rect x="228" y="78" width="244" height="272" rx="122" fill="url(#capsule)" stroke="#2f607a" stroke-width="4"/>
  <path d="M263 116 C300 94 400 94 437 116" stroke="rgba(210,247,255,0.45)" stroke-width="8" stroke-linecap="round"/>

  <rect x="269" y="122" width="162" height="188" rx="81" fill="#15303d"/>
  <path d="M270 222 C311 188 390 188 431 222" stroke="url(#line)" stroke-width="9" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="325" cy="208" r="7" fill="#4fffe8"/>
  <circle cx="377" cy="214" r="7" fill="#2fc0ff"/>
</svg>
